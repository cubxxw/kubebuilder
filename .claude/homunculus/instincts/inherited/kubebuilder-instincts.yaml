# Kubebuilder Workflow Upgrade K8s Or Controller Runtime Dependencies

## Action

Follow the upgrade-k8s-or-controller-runtime-dependencies workflow:
1. Update go.mod and go.sum in each testdata and tutorial project to the new dependency versions.
2. Update CRD YAMLs and generated files (e.g., deepcopy.go) to match new API versions or codegen output.
3. Update main.go and controller files if API or dependency changes require code adjustments.
4. Regenerate or update any charts, install manifests, or other deployment artifacts.
5. Update scaffolding templates if necessary to support the new versions.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: **/go.mod, **/go.sum, **/api/**/groupversion_info.go

